# Open Cheat Sheet in a floating terminal
bindsym $mod+Ctrl+slash exec kitty --class="floating_shell" -e sh -c "cat ~/.config/wehttamsnaps/cheat-sheet.txt; read"
# Backup config to GitHub
#bindsym $mod+Shift+s exec ~/.config/wehttamsnaps/scripts/backup-configs.sh

# ─────────────────────────────────────────────────────────────────────────────
# J.A.R.V.I.S. Sound Engine
# ─────────────────────────────────────────────────────────────────────────────

# Core System
bindsym $mod1+Shift+c reload && exec ~/.config/wehttamsnaps/scripts/voice-engine.sh reload
# Launchers
bindsym $mod+Return exec ~/.config/wehttamsnaps/scripts/voice-engine.sh terminal && kitty
bindsym $mod+f exec ~/.config/wehttamsnaps/scripts/voice-engine.sh files && thunar

# Photography
bindsym $mod+Shift+Ctrl+e exec ~/.config/wehttamsnaps/scripts/voice-engine.sh export && ~/.config/wehttamsnaps/scripts/sound-system photo-export

# Gaming Mode Toggle
bindsym $mod+F12 exec ~/.config/wehttamsnaps/scripts/toggle-gamemode.sh && \
    [ "$(swaymsg -t get_outputs | grep -q 'blur: enabled')" ] && \
    ~/.config/wehttamsnaps/scripts/voice-engine.sh gamemode-off || \
    ~/.config/wehttamsnaps/scripts/voice-engine.sh gamemode-on

# System Lock (Fixed to $mod1/Alt to avoid errors)
bindsym $mod1+F1 exec ~/.config/wehttamsnaps/scripts/voice-engine.sh lock && gtklock

# Application Launchers with Voice Feedback
bindsym $mod+p exec ~/.config/wehttamsnaps/scripts/voice-engine.sh spotify && spotify
bindsym $mod+o exec ~/.config/wehttamsnaps/scripts/voice-engine.sh obs && obs
#bindsym $mod+Shift+i exec ~/.config/wehttamsnaps/scripts/voice-engine.sh edit-config && kitty -e nvim ~/.config/sway/config
# Open Twitch Dashboard
bindsym $mod+Shift+b exec ~/.config/wehttamsnaps/scripts/voice-engine.sh browser && brave --new-window https://dashboard.twitch.tv
# Power Down with J.A.R.V.I.S. Farewell
bindsym $mod+Shift+BackSpace exec ~/.config/wehttamsnaps/scripts/power-down.sh

# Re-mapping the Exit Sway command to include the sound
bindsym $mod+Ctrl+e exec swaynag -t warning -m 'Systems Offline?' -B 'Yes' '~/.config/wehttamsnaps/scripts/power-down.sh'


# J.A.R.V.I.S. Status Report ($mod+Shift+r)
bindsym $mod+Shift+r exec ~/.config/wehttamsnaps/scripts/voice-engine.sh status-report && \
    notify-send "SYSTEM STATUS" "CPU: $(sensors | grep 'Package id 0' | awk '{print $4}')\nBackup: Active\nUser: Matthew" -i security-high








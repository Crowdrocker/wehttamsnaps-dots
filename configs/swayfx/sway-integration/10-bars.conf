# ╔══════════════════════════════════════════════════════════════════╗
# ║  10-bars.conf — Noctalia Shell Integration                      ║
# ║  Replaces Waybar entirely. Noctalia handles bar, dock,          ║
# ║  notifications, lock screen, launcher & control center.         ║
# ╚══════════════════════════════════════════════════════════════════╝

# ─── Remove the built-in swaybar ─────────────────────────────────────
# Noctalia provides its own bar, so we don't launch swaybar/waybar.
# The bar {} block is intentionally absent here.

# ─── Noctalia is launched in 08-autostart.conf via: ──────────────────
# exec qs -c noctalia-shell
#
# For Sway, Noctalia docs say to add this to your config.
# We call it from autostart so it restarts cleanly on swaymsg reload.

# ─── Noctalia IPC Keybinds ───────────────────────────────────────────
# Noctalia uses `qs ipc call noctalia-shell <command>` for keybinds.
# These supplement the binds already in 05-keybinds.conf.

# Open Noctalia launcher (replaces rofi on Super+Space)
bindsym $mod+space exec qs ipc call noctalia-shell toggleLauncher

# Open Noctalia control center (replaces custom scripts on Super+C)
bindsym $mod+c exec qs ipc call noctalia-shell toggleControlCenter

# Open Noctalia notification center
bindsym $mod+n exec qs ipc call noctalia-shell toggleNotificationCenter

# Open Noctalia settings
bindsym $mod+comma exec qs ipc call noctalia-shell toggleSettings

# Open Noctalia power/session menu
bindsym $mod+x exec qs ipc call noctalia-shell toggleSessionMenu

# ─── Layer Effects for Noctalia panels ───────────────────────────────
# (already set in 02-visual.conf but repeated here for clarity)
# layer_effects "noctalia" blur enable; shadows enable; corner_radius 10

# ─── Noctalia Color Scheme ───────────────────────────────────────────
# WehttamSnaps theme file location:
# ~/.config/noctalia/colorschemes/WehttamSnaps/WehttamSnaps.json
#
# To apply after install:
#   Open Noctalia settings → Theming → Color Scheme → WehttamSnaps
# Or via IPC:
#   qs ipc call noctalia-shell setColorScheme WehttamSnaps

# ─── Notes on Noctalia + SwayFX ──────────────────────────────────────
# • Noctalia handles: bar, dock, launcher, notifications,
#   control center, lock screen, wallpaper, settings panel
# • SwayFX handles: window tiling, keybinds, animations, blur
# • J.A.R.V.I.S. sound-system integrates independently of both
# • Gaming mode (toggle-gamemode.sh) disables blur on both
#   SwayFX layers AND Noctalia layer_effects simultaneously

# ╔══════════════════════════════════════════════════════════════════╗
# ║  07-workspaces.conf — Workspace Definitions                     ║
# ║  10 workspaces, app assignments, switch keybinds                ║
# ╚══════════════════════════════════════════════════════════════════╝

# ─── Workspace Names ─────────────────────────────────────────────────
set $ws1  "1:BROWSER"
set $ws2  "2:TERM"
set $ws3  "3:GAMING"
set $ws4  "4:STREAM"
set $ws5  "5:PHOTO"
set $ws6  "6:MEDIA"
set $ws7  "7:COMMS"
set $ws8  "8:MUSIC"
set $ws9  "9:FILES"
set $ws10 "10:SYS"

# ─── Switch to Workspace ─────────────────────────────────────────────
bindsym $mod+1  workspace $ws1
bindsym $mod+2  workspace $ws2
bindsym $mod+3  workspace $ws3
bindsym $mod+4  workspace $ws4
bindsym $mod+5  workspace $ws5
bindsym $mod+6  workspace $ws6
bindsym $mod+7  workspace $ws7
bindsym $mod+8  workspace $ws8
bindsym $mod+9  workspace $ws9
bindsym $mod+0  workspace $ws10

# ─── Move Window to Workspace ────────────────────────────────────────
bindsym $mod+shift+1  move container to workspace $ws1
bindsym $mod+shift+2  move container to workspace $ws2
bindsym $mod+shift+3  move container to workspace $ws3
bindsym $mod+shift+4  move container to workspace $ws4
bindsym $mod+shift+5  move container to workspace $ws5
bindsym $mod+shift+6  move container to workspace $ws6
bindsym $mod+shift+7  move container to workspace $ws7
bindsym $mod+shift+8  move container to workspace $ws8
bindsym $mod+shift+9  move container to workspace $ws9
bindsym $mod+shift+0  move container to workspace $ws10

# ─── Cycle Through Workspaces ────────────────────────────────────────
bindsym $mod+Tab         workspace next_on_output
bindsym $mod+shift+Tab   workspace prev_on_output
bindsym $mod+bracketright workspace next
bindsym $mod+bracketleft  workspace prev

# ─── App → Workspace Assignments ─────────────────────────────────────

# WS1 — Browser
assign [app_id="brave-browser"]             $ws1
assign [app_id="firefox"]                   $ws1
assign [class="Google-chrome"]              $ws1

# WS2 — Terminal / Dev
assign [app_id="ghostty"]                   $ws2
assign [app_id="foot"]                      $ws2
assign [app_id="code"]                      $ws2
assign [app_id="kate"]                      $ws2

# WS3 — Gaming
assign [class="steam"]                      $ws3
assign [class="Steam"]                      $ws3
assign [app_id="gamescope"]                 $ws3
assign [app_id="lutris"]                    $ws3
# Steam games (class changes per game — catch-all via title)
for_window [class="steam_app_*"]            move to workspace $ws3

# WS4 — Streaming / OBS
assign [app_id="com.obsproject.Studio"]     $ws4
assign [title="OBS*"]                       $ws4

# WS5 — Photography
assign [app_id="darktable"]                 $ws5
assign [app_id="digikam"]                   $ws5
assign [app_id="gimp"]                      $ws5
assign [app_id="krita"]                     $ws5
assign [app_id="rawtherapee"]               $ws5
assign [app_id="inkscape"]                  $ws5

# WS6 — Media / Video
assign [app_id="mpv"]                       $ws6
assign [app_id="vlc"]                       $ws6
assign [app_id="kdenlive"]                  $ws6
assign [app_id="handbrake"]                 $ws6

# WS7 — Communications
assign [app_id="discord"]                   $ws7
assign [class="discord"]                    $ws7
assign [app_id="signal"]                    $ws7

# WS8 — Music / Audio
assign [app_id="spotify"]                   $ws8
assign [class="Spotify"]                    $ws8
assign [app_id="pavucontrol"]               $ws8
assign [app_id="helvum"]                    $ws8
assign [app_id="qpwgraph"]                  $ws8

# WS9 — Files
assign [app_id="thunar"]                    $ws9
assign [app_id="org.kde.dolphin"]           $ws9

# WS10 — System
assign [app_id="nm-connection-editor"]      $ws10
assign [app_id="blueman-manager"]           $ws10
assign [app_id="protonup-qt"]               $ws10

# ─── Workspace Sound Events (J.A.R.V.I.S. / iDroid context switch) ───
# When entering WS3 (Gaming) → iDroid mode
# When entering WS4 (Streaming) → streaming sound
# These are handled by the sound-system auto_detect_mode() function
# which watches the current workspace via state files.
#
# Workspace change hook:
exec_always $HOME/.config/sway/scripts/workspace-watcher.sh &

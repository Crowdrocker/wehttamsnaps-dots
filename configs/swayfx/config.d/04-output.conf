# ╔══════════════════════════════════════════════════════════════════╗
# ║  04-output.conf — Output / Display Configuration                ║
# ║  Monitor layout, resolution, wallpaper                          ║
# ║  Read `man 5 sway-output` for full reference                    ║
# ╚══════════════════════════════════════════════════════════════════╝

# ─── Primary Display (RX 580 — 1920×1080 @ 60Hz) ─────────────────────
# Dell XPS 8700 — single monitor setup
# Run `swaymsg -t get_outputs` to find your exact output name
output * {
    # Default resolution & refresh rate for RX 580
    mode   1920x1080@60Hz
    # Screen position (top-left corner)
    pos    0 0
    # Scale factor: 1 = native pixels (best for 1080p)
    scale  1
    # Background wallpaper
    # Place your wallpapers in ~/.config/sway/wallpapers/
    #bg     $HOME/.config/sway/wallpapers/wehttamsnaps-default.jpg fill
}

# ─── Multi-Monitor Example (uncomment & adjust if you add a 2nd screen)
# output HDMI-A-1 {
#     mode   1920x1080@60Hz
#     pos    1920 0
#     bg     $HOME/.config/sway/wallpapers/wehttamsnaps-default.jpg fill
# }

# ─── Wallpaper via Noctalia ──────────────────────────────────────────
# Noctalia shell can override the wallpaper above.
# Super + Shift + W  → Wallpaper browser / toggle
# The wallpaper script is at: ~/.config/sway/scripts/wallpaper.sh

# ─── RX 580 AMD Environment Variables ────────────────────────────────
# Set in /etc/environment for system-wide effect, but also declared here
# for SwayFX session awareness.
#
# AMD_VULKAN_ICD=RADV          → Use Mesa RADV (open-source, faster)
# RADV_PERFTEST=gpl            → Enable GPL pipeline cache (better FPS)
# These are set in /etc/environment — see docs/INSTALL.md

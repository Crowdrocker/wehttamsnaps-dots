# ╔══════════════════════════════════════════════════════════════════╗
# ║  02-visual.conf — SwayFX Visual Effects                         ║
# ║  Blur, shadows, corner radius, dim, animations                  ║
# ╚══════════════════════════════════════════════════════════════════╝

# ─── Corner Radius ───────────────────────────────────────────────────
corner_radius 8

# ─── Window Background Blur ──────────────────────────────────────────
blur enable
blur_xray off
blur_passes 4
blur_radius 8

# ─── Shadows ─────────────────────────────────────────────────────────
shadows enable
shadows_on_csd off
shadow_blur_radius 20
shadow_color #00000099

# ─── Layer Effects (Waybar, Rofi, notifications) ─────────────────────
# Waybar gets blur + shadows + rounded corners
layer_effects "waybar"       blur enable; shadows enable; corner_radius 10
# Rofi launcher blur
layer_effects "rofi"         blur enable; shadows enable; corner_radius 12
# Noctalia shell panels
layer_effects "noctalia"     blur enable; shadows enable; corner_radius 10
# Notification daemon
layer_effects "notifications" blur enable; shadows enable; corner_radius 8

# ─── Inactive Window Dimming ─────────────────────────────────────────
# 0.0 = no dim  |  1.0 = fully dimmed
# Slightly dim inactive windows so focus is clear without being harsh
default_dim_inactive 0.15
dim_inactive_colors.unfocused #000000CC
dim_inactive_colors.urgent    #900000AA

# ─── Scratchpad Minimize ─────────────────────────────────────────────
# Minimized windows go to scratchpad (Windows-style minimize)
scratchpad_minimize enable

# ─── Animations (SwayFX) ─────────────────────────────────────────────
# NOTE: gaming mode script (09-gaming.conf / toggle-gamemode.sh)
# will disable animations for max FPS when activated.
# animation enable

# ─── Transparency Rules ──────────────────────────────────────────────
# Terminal: slight transparency for that cyberpunk aesthetic
for_window [app_id="ghostty"]   opacity 0.93
for_window [app_id="foot"]      opacity 0.93
# Rofi launcher
for_window [app_id="rofi"]      opacity 0.95
# Keep browsers and games fully opaque
for_window [app_id="brave-browser"] opacity 1.0
for_window [app_id="firefox"]       opacity 1.0
for_window [class="steam"]          opacity 1.0
for_window [class="gamescope"]      opacity 1.0

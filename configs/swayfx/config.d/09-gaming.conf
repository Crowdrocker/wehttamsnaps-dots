# ─── Steam Library Paths (RX 580 / LINUXDRIVE) ───────────────────────
# Main game storage on the 1TB SSD
# /run/media/wehttamsnaps/LINUXDRIVE/SteamLibrary
# /run/media/wehttamsnaps/LINUXDRIVE/Modlist_Packs
# /run/media/wehttamsnaps/LINUXDRIVE/Modlist_Downloads

# ─── Gaming Keybinds (also in 05-keybinds.conf) ──────────────────────
# Super + G         → Toggle gaming mode (iDroid voice)
# Super + Alt + S   → Launch Steam (with sound)
# Super + Alt + G   → Steam + Gamescope (performance shell)
# Super + Alt + L   → Lutris
# Super + Alt + P   → ProtonUp-Qt

# ─── Gaming Mode Notes ───────────────────────────────────────────────
# The actual toggle logic lives in:
# ~/.config/sway/scripts/toggle-gamemode.sh
#
# When GAMING MODE ON:
#   - Plays iDroid "Combat systems online" sound
#   - Disables blur, shadows, dim (max FPS)
#   - Sets CPU governor to performance
#   - Creates ~/.cache/wehttamsnaps/gaming-mode.active flag
#   - sound-system auto-switches to iDroid voice pack
#
# When GAMING MODE OFF:
#   - Plays iDroid "Returning to normal operations" sound
#   - Re-enables SwayFX visual effects
#   - Resets CPU governor to schedutil
#   - Removes gaming-mode.active flag
#   - sound-system returns to J.A.R.V.I.S. voice pack

# ─── Gamescope Launch Options (RX 580 @ 1080p) ───────────────────────
# Used by launch-gamescope.sh:
# gamescope -w 1920 -h 1080 -r 60 --backend wayland --adaptive-sync
#            --mangoapp -- steam -gamepadui

# ─── MangoHud (in-game overlay) ──────────────────────────────────────
# Enable per-game by setting MANGOHUD=1 in Steam launch options:
# MANGOHUD=1 %command%
# Config: ~/.config/MangoHud/MangoHud.conf

# ─── VkBasalt (post-processing: sharpening, CAS) ─────────────────────
# Enable per-game: ENABLE_VKBASALT=1 %command%
# Config: ~/.config/vkBasalt.conf

# ─── AMD RX 580 Mesa/RADV Launch Option Reminders ────────────────────
# Add to Steam launch options for best RX 580 performance:
# RADV_PERFTEST=gpl AMD_VULKAN_ICD=RADV gamemoderun %command%
# For DX11/DX12 games via Proton:
# PROTON_USE_WINED3D=0 PROTON_NO_ESYNC=0 gamemoderun %command%
# For Cyberpunk 2077 specifically (GE-Proton recommended):
# PROTON_USE_WINED3D=0 WINE_FULLSCREEN_FSR=1 gamemoderun %command%

# ─── Mod Organizer 2 — Proton Setup ──────────────────────────────────
# Run via Proton in a Steam shortcut or Lutris
# Wine prefix: ~/.local/share/Steam/steamapps/compatdata/<appid>/pfx
# NXM handler: ~/.local/share/applications/nxm-handler.desktop
# MO2 portable instances detected in:
# /run/media/wehttamsnaps/LINUXDRIVE/Modlist_Packs/

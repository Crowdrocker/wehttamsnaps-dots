# ╔══════════════════════════════════════════════════════════════════╗
# ║  08-autostart.conf — Autostart (Noctalia Edition)               ║
# ║  Waybar removed — Noctalia Shell handles all panel/UI duties     ║
# ╚══════════════════════════════════════════════════════════════════╝

# ════════════════════════════════════════════════════════════════════
#  J.A.R.V.I.S. BOOT SEQUENCE
# ════════════════════════════════════════════════════════════════════
exec $HOME/.config/sway/scripts/jarvis-boot.sh

# ════════════════════════════════════════════════════════════════════
#  NOCTALIA SHELL  (replaces Waybar entirely)
# ════════════════════════════════════════════════════════════════════
# Noctalia provides: top bar, app launcher, notification center,
# control center, lock screen, wallpaper browser, power menu.
# It reads color scheme from:
#   ~/.config/noctalia/colorschemes/WehttamSnaps/WehttamSnaps.json
exec_always qs -c noctalia-shell

# ════════════════════════════════════════════════════════════════════
#  SYSTEM SERVICES
# ════════════════════════════════════════════════════════════════════
exec systemctl --user start pipewire pipewire-pulse wireplumber

# Notification daemon — Noctalia has its own, but dunst can coexist
# Comment out dunst if you prefer Noctalia's built-in notifications
# exec_always dunst

exec /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1

exec dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP=sway

exec systemctl --user start xdg-desktop-portal xdg-desktop-portal-wlr

# ════════════════════════════════════════════════════════════════════
#  IDLE & LOCK SCREEN
# ════════════════════════════════════════════════════════════════════
# Noctalia handles lock screen, but swayidle triggers it.
# Use the Noctalia IPC lock command instead of swaylock directly.
exec swayidle -w \
    timeout 600  'qs ipc call noctalia-shell lock' \
    timeout 900  'swaymsg "output * dpms off"' \
    resume       'swaymsg "output * dpms on"' \
    before-sleep 'qs ipc call noctalia-shell lock'

# ════════════════════════════════════════════════════════════════════
#  CLIPBOARD MANAGER
# ════════════════════════════════════════════════════════════════════
exec wl-paste --type text  --watch cliphist store
exec wl-paste --type image --watch cliphist store

# ════════════════════════════════════════════════════════════════════
#  GTK / QT THEMING  (Noctalia manages Qt via its own theming)
# ════════════════════════════════════════════════════════════════════
exec_always gsettings set org.gnome.desktop.interface cursor-theme  'Bibata-Modern-Classic'
exec_always gsettings set org.gnome.desktop.interface cursor-size    24
exec_always gsettings set org.gnome.desktop.interface gtk-theme     'Tokyonight-Dark-BL'
exec_always gsettings set org.gnome.desktop.interface icon-theme    'Papirus-Dark'
exec_always gsettings set org.gnome.desktop.interface font-name     'JetBrainsMono Nerd Font 11'

# ════════════════════════════════════════════════════════════════════
#  GAMING
# ════════════════════════════════════════════════════════════════════
exec systemctl --user start gamemoded 2>/dev/null || true

# ════════════════════════════════════════════════════════════════════
#  WELCOME SCREEN
# ════════════════════════════════════════════════════════════════════
exec $HOME/.config/sway/scripts/welcome.sh

# ════════════════════════════════════════════════════════════════════
#  TEMPERATURE MONITORING
# ════════════════════════════════════════════════════════════════════
exec $HOME/.config/sway/scripts/temp-monitor.sh &

# ════════════════════════════════════════════════════════════════════
#  WORKSPACE SOUND WATCHER
# ════════════════════════════════════════════════════════════════════
exec $HOME/.config/sway/scripts/workspace-watcher.sh &


# ────────────────────────────────────────────────────────────────────────────────
# IDLE MANAGEMENT
# ────────────────────────────────────────────────────────────────────────────────
exec swayidle idlehint 1
exec_always swayidle -w before-sleep "gtklock -d"

# ────────────────────────────────────────────────────────────────────────────────
# NOTIFICATIONS
# ────────────────────────────────────────────────────────────────────────────────
exec mako

# ────────────────────────────────────────────────────────────────────────────────
# TERMINAL SERVER
# ────────────────────────────────────────────────────────────────────────────────
# Start foot server for fast terminal launching
exec_always --no-startup-id foot --server

# ────────────────────────────────────────────────────────────────────────────────
# AUTOTILING
# ────────────────────────────────────────────────────────────────────────────────
exec autotiling


# ────────────────────────────────────────────────────────────────────────────────
# OUTPUT MANAGEMENT
# ────────────────────────────────────────────────────────────────────────────────
exec kanshi

# ────────────────────────────────────────────────────────────────────────────────
# APPLICATION DRAWER
# ────────────────────────────────────────────────────────────────────────────────
exec_always nwg-drawer -r -c 7 -is 90 -mb 10 -ml 50 -mr 50 -mt 10

# ────────────────────────────────────────────────────────────────────────────────
# WINDOW SWITCHER
# ────────────────────────────────────────────────────────────────────────────────
exec_always swayrd

# ────────────────────────────────────────────────────────────────────────────────
# VISUAL EFFECTS
# ────────────────────────────────────────────────────────────────────────────────
# Sway fader for smooth window transitions
exec python3 ~/.config/sway/scripts/swayfader.py

# ────────────────────────────────────────────────────────────────────────────────
# AUTOSTART APPLICATIONS
# ────────────────────────────────────────────────────────────────────────────────
# Launch all Sway applications in autostart directories
exec dex -a -e sway


# ────────────────────────────────────────────────────────────────────────────────
# J.A.R.V.I.S. SOUND SYSTEM
# ────────────────────────────────────────────────────────────────────────────────
#exec --no-startup-id sound-system startup
#exec_always ~/.config/wehttamsnaps/scripts/jarvis-sounds.sh startup
exec_always ~/.config/wehttamsnaps/scripts/voice-engine.sh startup
# Emergency Silence
bindsym $mod+Escape exec killall mpv
# ────────────────────────────────────────────────────────────────────────────────
# WELCOME SCREEN
# ────────────────────────────────────────────────────────────────────────────────
exec_always --no-startup-id python3 ~/.config/wehttamsnaps/scripts/welcome.py












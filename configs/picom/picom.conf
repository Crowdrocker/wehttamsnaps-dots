# --- Backend ---
backend = "glx";
glx-no-stencil = true;
glx-copy-from-front = false;

# --- Opacity & Blurring ---
active-opacity = 0.93;
inactive-opacity = 0.85;
frame-opacity = 0.7;

# Dual-kawase blur (The "Glass" effect)
blur-method = "dual_kawase";
blur-strength = 6;
blur-background = true;

# --- Fading (Smooth Transitions) ---
fading = true;
fade-delta = 4;
fade-in-step = 0.03;
fade-out-step = 0.03;

# --- Corners & Shadows ---
corner-radius = 12;
shadow = true;
shadow-radius = 15;
shadow-offset-x = -15;
shadow-offset-y = -15;
shadow-opacity = 0.5;
shadow-color = "#8A2BE2"; # Your Violet Glow

# --- Gaming Optimization ---
# Disables the compositor for full-screen games to prevent lag
unredir-if-possible = true;

wintypes:
{
  tooltip = { fade = true; shadow = true; opacity = 0.75; focus = true; full-shadow = false; };
  dock = { shadow = false; clip-shadow-above = true; }
  dnd = { shadow = false; }
  popup_menu = { opacity = 0.8; }
  dropdown_menu = { opacity = 0.8; }
};

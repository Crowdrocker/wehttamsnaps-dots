# ╔══════════════════════════════════════════════════════════════════╗
# ║  06-windows.conf — Window Rules & Assignments                   ║
# ║  Floating rules, per-app settings, inhibit idle                 ║
# ╚══════════════════════════════════════════════════════════════════╝
# Tip: Run `swaymsg -t get_tree` or use `swaymsg -t get_outputs`
# to find app_id / class / title values for any window.

# ════════════════════════════════════════════════════════════════════
#  FLOATING WINDOWS
# ════════════════════════════════════════════════════════════════════

# ─── System dialogs & utilities ──────────────────────────────────────
for_window [app_id="pavucontrol"]          floating enable, resize set 800 500
for_window [app_id="nm-connection-editor"] floating enable
for_window [app_id="blueman-manager"]      floating enable, resize set 700 500
for_window [title="File Operation Progress"] floating enable
for_window [title="Confirm to replace files"] floating enable
for_window [app_id="polkit-gnome-authentication-agent-1"] floating enable

# ─── Thunar / Dolphin file pickers ───────────────────────────────────
for_window [app_id="thunar" title="^(?!.*Thunar).*$"] floating enable
for_window [app_id="org.kde.dolphin" title="Open"] floating enable

# ─── Rofi launcher ───────────────────────────────────────────────────
for_window [app_id="rofi"]                 floating enable

# ─── Notifications & popups ──────────────────────────────────────────
for_window [app_id="dunst"]                floating enable

# ─── WehttamSnaps custom dialogs ─────────────────────────────────────
for_window [title="WehttamSnaps Welcome"]  floating enable, resize set 900 600
for_window [title="J.A.R.V.I.S.*"]        floating enable, resize set 800 500
for_window [title="Keybindings*"]          floating enable, resize set 1100 750

# ─── Gaming-related float ────────────────────────────────────────────
for_window [class="steam_app_*"]           fullscreen enable
for_window [app_id="gamescope"]            fullscreen enable
for_window [title="Steam - News"]          floating enable
for_window [class="steam" title="Friends"] floating enable, resize set 300 500
for_window [app_id="lutris"]               floating enable, resize set 900 600
for_window [app_id="protonup-qt"]          floating enable, resize set 700 450

# ─── ModOrganizer 2 (running via Wine/Proton) ────────────────────────
# MO2 window title: "Mod Organizer"
for_window [title="Mod Organizer"]         floating enable, resize set 1400 900
for_window [title="MO2 Linux Helper"]      floating enable, resize set 1200 800
# xEdit / FO4Edit / SSEEdit
for_window [title=".*Edit.*"]              floating enable, resize set 1200 800
for_window [title="Synthesis"]             floating enable, resize set 1000 700
for_window [title="BodySlide*"]            floating enable

# ─── Media apps ──────────────────────────────────────────────────────
for_window [app_id="mpv"]                  floating enable
# MPV media player window rules — center and resize for comfortable viewing
for_window [app_id="mpv"]                  resize set 1280 720, move position center

# ─── Calculator, calendar ────────────────────────────────────────────
for_window [app_id="gnome-calculator"]     floating enable, resize set 360 480
for_window [app_id="org.gnome.Calendar"]   floating enable, resize set 500 550

# ════════════════════════════════════════════════════════════════════
#  IDLE INHIBIT (Prevent screen sleeping)
# ════════════════════════════════════════════════════════════════════
# Games — never sleep while a game is fullscreen
for_window [class="steam_app_*"]           inhibit_idle fullscreen
for_window [app_id="gamescope"]            inhibit_idle fullscreen
# Video playback
for_window [app_id="mpv"]                  inhibit_idle focus
# OBS Studio — never sleep while streaming/recording
for_window [app_id="com.obsproject.Studio"] inhibit_idle open

# ════════════════════════════════════════════════════════════════════
#  BORDER OVERRIDES
# ════════════════════════════════════════════════════════════════════
# No borders on fullscreen apps
for_window [class="steam_app_*"]           border none
for_window [app_id="gamescope"]            border none
# Remove title bars globally (prefer pixel borders)
for_window [tiling]  border pixel 2
for_window [floating] border pixel 2

# ════════════════════════════════════════════════════════════════════
#  XWayland compatibility
# ════════════════════════════════════════════════════════════════════
# Allow Xwayland apps to function normally
xwayland enable

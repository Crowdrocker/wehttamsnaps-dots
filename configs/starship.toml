# ╔══════════════════════════════════════════════════════════════════╗
# ║  starship.toml — WehttamSnaps Cyberpunk Prompt                  ║
# ║  github.com/Crowdrocker  |  twitch.tv/WehttamSnaps              ║
# ║                                                                  ║
# ║  Palette:                                                        ║
# ║    Cyan   #00ffd1  — primary / directories / git branch         ║
# ║    Blue   #3b82ff  — secondary / language runtimes              ║
# ║    Pink   #ff5af1  — accent / errors / alerts                   ║
# ║    Dark   #0a0014  — background segments                        ║
# ╚══════════════════════════════════════════════════════════════════╝

# ── Format ────────────────────────────────────────────────────────────
# Two-line prompt:
#   Line 1:  [WS] [dir] [git] [lang/runtime modules] [status]
#   Line 2:  ❯  (cyan in normal mode, pink on error)

format = """
[╭](bold bright-black)\
$os\
$username\
$hostname\
$directory\
$git_branch\
$git_state\
$git_status\
$git_metrics\
$fill\
$nodejs\
$python\
$rust\
$golang\
$java\
$lua\
$docker_context\
$jobs\
$cmd_duration\
$time\
$line_break\
[╰](bold bright-black)\
$character"""

# ── Palette ────────────────────────────────────────────────────────────
palette = "wehttamsnaps"

[palettes.wehttamsnaps]
cyan    = "#00ffd1"
blue    = "#3b82ff"
pink    = "#ff5af1"
dark    = "#0a0014"
surface = "#110022"
text    = "#cce8e4"
dimtext = "#6a8e8a"
white   = "#e8f8f5"
yellow  = "#f4c430"
red     = "#ff5af1"   # pink as "red" — on-brand error color

# ── OS icon ────────────────────────────────────────────────────────────
[os]
disabled = false
format   = "[$symbol]($style) "
style    = "bold cyan"

[os.symbols]
Arch = " "
Linux = " "
Windows = " "
Macos = " "

# ── Username ───────────────────────────────────────────────────────────
[username]
show_always = false           # only shows when SSH or root
format      = "[$user]($style)[@](dimtext)"
style_user  = "bold blue"
style_root  = "bold pink"

# ── Hostname ───────────────────────────────────────────────────────────
[hostname]
ssh_only  = true
format    = "[$hostname]($style) "
style     = "bold blue"
trim_at   = "."

# ── Directory ──────────────────────────────────────────────────────────
[directory]
format            = "[  ](cyan)[$path]($style)[$read_only]($read_only_style) "
style             = "bold cyan"
read_only         = "  "
read_only_style   = "pink"
truncation_length = 4
truncate_to_repo  = true
home_symbol       = "~"

[directory.substitutions]
"/run/media/wehttamsnaps/LINUXDRIVE" = "󰆼 LINUXDRIVE"
"/run/media/wehttamsnaps/LINUXDRIVE/SteamLibrary" = " Steam"
"/run/media/wehttamsnaps/LINUXDRIVE/Modlist_Packs" = "󰮦 Modpacks"
"/run/media/wehttamsnaps/LINUXDRIVE/Modlist_Downloads" = "󰮦 ModDL"
"~/.config/sway" = " Sway"
"~/.config/noctalia" = " Noctalia"
"~/.config/rofi" = " Rofi"
"~/Pictures" = " Pictures"
"~/Videos" = " Videos"
"~/Downloads" = " Downloads"

# ── Git Branch ─────────────────────────────────────────────────────────
[git_branch]
format   = "[  ](blue)[$branch(:$remote_branch)]($style) "
style    = "bold blue"
symbol   = ""
truncation_length = 24

# ── Git Status ─────────────────────────────────────────────────────────
[git_status]
format      = "([$all_status$ahead_behind]($style) )"
style       = "bold pink"
ahead       = "⇡${count}"
behind      = "⇣${count}"
diverged    = "⇕⇡${ahead_count}⇣${behind_count}"
conflicted  = "󰞇 "
untracked   = "? "
stashed     = " "
modified    = "! "
staged      = "+ "
renamed     = "» "
deleted     = "✘ "

# ── Git State (rebasing etc) ───────────────────────────────────────────
[git_state]
format = "[$state($progress_current/$progress_total)]($style) "
style  = "bold yellow"

# ── Git Metrics (added/deleted lines) ─────────────────────────────────
[git_metrics]
disabled       = false
added_style    = "bold cyan"
deleted_style  = "bold pink"
format         = "([+$added]($added_style) )([-$deleted]($deleted_style) )"

# ── Fill ───────────────────────────────────────────────────────────────
# Pushes right-side modules to the far right
[fill]
symbol = " "
style  = "bold bright-black"

# ── Node.js ────────────────────────────────────────────────────────────
[nodejs]
format  = "[ ](blue)[$version]($style) "
style   = "blue"
version_format = "v${raw}"

# ── Python ─────────────────────────────────────────────────────────────
[python]
format  = "[ ](blue)[$version]($style)([\\($virtualenv\\)](dimtext)) "
style   = "blue"
version_format = "${raw}"

# ── Rust ───────────────────────────────────────────────────────────────
[rust]
format  = "[ ](blue)[$version]($style) "
style   = "blue"
version_format = "v${raw}"

# ── Go ─────────────────────────────────────────────────────────────────
[golang]
format  = "[ ](blue)[$version]($style) "
style   = "blue"

# ── Java ───────────────────────────────────────────────────────────────
[java]
format  = "[ ](blue)[$version]($style) "
style   = "blue"

# ── Lua ────────────────────────────────────────────────────────────────
[lua]
format  = "[ ](blue)[$version]($style) "
style   = "blue"

# ── Docker context ─────────────────────────────────────────────────────
[docker_context]
format = "[ ](blue)[$context]($style) "
style  = "blue"

# ── Background Jobs ────────────────────────────────────────────────────
[jobs]
format    = "[$symbol$number]($style) "
style     = "bold yellow"
symbol    = "󰒓 "
threshold = 1

# ── Command Duration ───────────────────────────────────────────────────
[cmd_duration]
min_time          = 2000       # show after 2s+
format            = "[ ](dimtext)[$duration]($style) "
style             = "bold yellow"
show_milliseconds = false

# ── Time ───────────────────────────────────────────────────────────────
[time]
disabled    = false
format      = "[ ](dimtext)[$time]($style)"
style       = "dimtext"
time_format = "%H:%M"
use_12hr    = false

# ── Character (the prompt symbol) ─────────────────────────────────────
# Cyan ❯ normally, pink ❯ on error
[character]
success_symbol = "[❯](bold cyan)"
error_symbol   = "[❯](bold pink)"
vimcmd_symbol  = "[❮](bold blue)"

# ── Line Break ─────────────────────────────────────────────────────────
[line_break]
disabled = false

# ── Package version ────────────────────────────────────────────────────
[package]
format  = "[ ](dimtext)[$version]($style) "
style   = "dimtext"
disabled = false

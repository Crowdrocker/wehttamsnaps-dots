# ╔══════════════════════════════════════════════════════════════════╗
# ║  03-input.conf — Input Devices                                  ║
# ║  Keyboard, mouse, touchpad configuration                        ║
# ║  Read `man 5 sway-input` for full reference                     ║
# ╚══════════════════════════════════════════════════════════════════╝

# ─── Keyboard ────────────────────────────────────────────────────────
input type:keyboard {
    # Enable numlock on boot
    xkb_numlock enabled

    # Key repeat: delay (ms) before repeat, rate (keys/sec) while held
    repeat_delay 300
    repeat_rate  40
}

# ─── Auto-detect keyboard layout from localectl ──────────────────────
exec_always {
    'swaymsg input type:keyboard xkb_layout "$(localectl status | grep "X11 Layout" | sed -e "s/^.*X11 Layout://")"'
    'swaymsg input type:keyboard xkb_variant "$(localectl status | grep "X11 Variant" | sed -e "s/^.*X11 Variant://")"'
}

# ─── Mouse / Pointer ─────────────────────────────────────────────────
input type:pointer {
    # Disable mouse acceleration (better for gaming)
    accel_profile flat
    pointer_accel  0
}

# ─── Touchpad (if present) ───────────────────────────────────────────
input type:touchpad {
    dwt              enabled   # Disable while typing
    tap              enabled   # Tap-to-click
    natural_scroll   disabled  # Set enabled if you prefer macOS-style
    middle_emulation enabled
}

# ─── Focus Follows Mouse ─────────────────────────────────────────────
# "yes" = focus window under cursor automatically
# "no"  = only focus on click (better for gaming/streaming)
focus_follows_mouse no

# ─── Mouse Warping ───────────────────────────────────────────────────
# Moves pointer to center of newly focused window
mouse_warping none

# ─── Cursor Theme ────────────────────────────────────────────────────
# Set to a dark cursor to match the WehttamSnaps theme
seat seat0 xcursor_theme Bibata-Modern-Classic 24

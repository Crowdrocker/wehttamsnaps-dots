# ╔══════════════════════════════════════════════════════════════════╗
# ║  01-variables.conf — WehttamSnaps Brand Variables               ║
# ║  Colors, fonts, gaps, borders                                   ║
# ╚══════════════════════════════════════════════════════════════════╝

# ─── WehttamSnaps Brand Palette ────────────────────────────────────
# Matches the gradient in the WS logo: purple → blue → cyan → pink
set $color_cyan     #00ffd1
set $color_blue     #3b82ff
set $color_purple   #8b00ff
set $color_pink     #ff5af1
set $color_bg       #0a0014
set $color_dark     #050008
set $color_mid      #110022

# ─── Sway Window Colors ─────────────────────────────────────────────
# class                 border          background      text            indicator       child_border
client.focused          $color_cyan     $color_mid      #ffffff         $color_blue     $color_cyan
client.focused_inactive $color_purple   $color_dark     #888888         $color_dark     $color_purple
client.unfocused        #1a0030         $color_dark     #555555         $color_dark     #1a0030
client.urgent           $color_pink     #3d0020         #ffffff         $color_pink     $color_pink
client.placeholder      #000000         $color_dark     #888888         #000000         #000000

# ─── Borders & Gaps ─────────────────────────────────────────────────
default_border          pixel 2
default_floating_border pixel 2
hide_edge_borders       smart

# Inner gap between windows, outer gap from screen edge
gaps inner 6
gaps outer 4

# ─── Font ───────────────────────────────────────────────────────────
# Used for titlebars (hidden by default but needed for some apps)
font pango:JetBrainsMono Nerd Font 10

# ─── Modifier Key ───────────────────────────────────────────────────
set $mod Mod4
set $alt Mod1

# ─── Terminal & Launcher ─────────────────────────────────────────────
set $term            ghostty
set $launcher        rofi -show drun
set $file_manager    thunar
set $file_manager2   dolphin
set $browser         brave
set $editor          kate

# ─── Script Paths ────────────────────────────────────────────────────
set $scripts         $HOME/.config/sway/scripts
set $sound_system    /usr/local/bin/sound-system
set $jarvis          /usr/local/bin/jarvis
set $jarvis_menu     /usr/local/bin/jarvis-menu

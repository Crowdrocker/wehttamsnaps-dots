# ═══════════════════════════════════════════════════════════════════════
#   WehttamSnaps Picom Config — Performance First
#   RX 580 / i7-4790 optimised — shadows only, no blur, no animations
#   github.com/Crowdrocker  |  twitch.tv/WehttamSnaps
#
#   Install: cp picom.conf ~/.config/picom.conf
#   Start:   picom --config ~/.config/picom.conf -b
#   Kill:    pkill picom
#   Reload:  pkill picom && picom --config ~/.config/picom.conf -b
# ═══════════════════════════════════════════════════════════════════════

# ── Backend ─────────────────────────────────────────────────────────────
# xrender is safest and most stable on AMD/RX 580 with open-source mesa
# Switch to "glx" only if you want blur later and test stability first
backend = "xrender";

# ── VSync ───────────────────────────────────────────────────────────────
# Prevents screen tearing — works well with xrender on RX 580
vsync = true;

# ── Shadows ─────────────────────────────────────────────────────────────
shadow = true;
shadow-radius   = 12;
shadow-opacity  = 0.45;
shadow-offset-x = -8;
shadow-offset-y = -8;
shadow-color    = "#000000";

# Don't draw shadows on these window types
shadow-exclude = [
    "window_type = 'dock'",       # i3bar
    "window_type = 'desktop'",    # desktop background
    "window_type = 'tooltip'",
    "window_type = 'notification'",
    "window_type = 'dnd'",
    "window_type = 'combo'",
    "class_g = 'i3bar'",
    "class_g = 'i3-frame'",
    "class_g = 'rofi'",           # rofi draws its own border
    "_GTK_FRAME_EXTENTS@:c",      # GTK client-side decorations
    "bounding_shaped && !rounded_corners"
];

# ── Opacity ──────────────────────────────────────────────────────────────
# Subtle dimming for inactive windows — makes active window pop
# Set both to 1.0 if you don't want any dimming at all
active-opacity    = 1.0;
inactive-opacity  = 1.0;
frame-opacity     = 1.0;

# Don't dim these even when inactive
opacity-rule = [
    "100:class_g = 'steam'i",
    "100:class_g = 'i3bar'",
    "100:class_g = 'rofi'",
    "100:class_g = 'dunst'",
    "100:window_type = 'dock'",
    "100:window_type = 'notification'",
    "100:class_g = 'Steam'",
    "100:class_g = 'steam'",
    "100:class_g = 'gamescope'"
];

# ── Fading ───────────────────────────────────────────────────────────────
# Very fast fade — just enough to avoid jarring instant cuts
# Set "fading = false" if you want zero transition overhead
fading          = true;
fade-in-step    = 0.08;
fade-out-step   = 0.08;
fade-delta      = 4;

fade-exclude = [
    "window_type = 'dock'",
    "window_type = 'desktop'"
];

# ── Blur ─────────────────────────────────────────────────────────────────
# OFF — costs GPU time and can cause stutters on RX 580 with xrender
# To enable later: switch backend to "glx" and uncomment below
# blur-method = "dual_kawase";
# blur-strength = 3;
# blur-background = true;

# ── Corners ──────────────────────────────────────────────────────────────
# OFF — rounded corners require glx backend
# corner-radius = 6;

# ── Performance tweaks ───────────────────────────────────────────────────
# Don't redraw windows that are fully occluded — saves CPU/GPU
use-damage = true;

# Skip the initial repaint on startup
no-use-damage = false;

# Don't draw on windows that aren't visible
unredir-if-possible = true;

# Delay before unredirecting (ms) — prevents flickering when switching
unredir-if-possible-delay = 500;

# Exclude fullscreen games/apps from compositor entirely
# This gives maximum performance when gaming
unredir-if-possible-exclude = [
    "window_type = 'normal' && !focused"
];

# ── Logging ──────────────────────────────────────────────────────────────
log-level = "warn";
# log-file = "~/.cache/wehttamsnaps/picom.log";

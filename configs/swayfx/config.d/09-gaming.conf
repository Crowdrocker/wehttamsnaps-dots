# Last file loaded → these bindings win over everything earlier
# ════════════════════════════════════════════════════════════════════════════════
# --- 1. Window Management (Fixing the V/H Conflicts) ---

bindsym --to-code $mod1+v exec ~/.config/wehttamsnaps/scripts/voice-engine.sh float && swaymsg floating toggle

# --- 2. Browsers (Fixing the Duplicate Binds) ---

bindsym --to-code $mod+b exec ~/.config/wehttamsnaps/scripts/voice-engine.sh browser && brave


# --- 3. Core Shortcuts ---
#bindsym $mod+Shift+c reload[cite: 1]
bindsym $mod+Shift+s exec ~/.config/wehttamsnaps/scripts/voice-engine.sh reload && ~/scripts/github-backup.sh[cite: 1]

# --- 1. Discord (Replacing Rofi) ---
#bindsym $mod+mod1+d exec ~/.config/wehttamsnaps/scripts/voice-engine.sh discord && discord

# --- 2. Spotify (Media Bind) ---

bindsym $mod+m exec ~/.config/wehttamsnaps/scripts/voice-engine.sh spotify && spotify

# --- 3. The Stream Mode (The "Big Launch") ---
# --- The "WehttamSnaps" Broadcast Deployment ($mod+Shift+Control+s) ---
# WehttamSnaps Stream Mode ($mod+Shift+Control+s)
bindsym $mod+Shift+Ctrl+s exec \
    ~/.config/wehttamsnaps/scripts/voice-engine.sh obs && \
    discord & spotify & obs && \
    notify-send "BROADCAST READY" "OBS, Discord, and Spotify are online." -i camera-photo

bindsym $mod1+s exec ~/.config/wehttamsnaps/scripts/voice-engine.sh shutdown && noctalia


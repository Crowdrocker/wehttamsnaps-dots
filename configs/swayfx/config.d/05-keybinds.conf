# ╔══════════════════════════════════════════════════════════════════╗
# ║  05-keybinds.conf — Keybindings                                 ║
# ║  Full WehttamSnaps keybind layout                               ║
# ║  Variables ($mod, $term, etc.) defined in 01-variables.conf     ║
# ╚══════════════════════════════════════════════════════════════════╝

# ════════════════════════════════════════════════════════════════════
#  J.A.R.V.I.S. QUICKSHELL (Noctalia panels)
# ════════════════════════════════════════════════════════════════════
bindsym $mod+shift+space       exec $launcher
bindsym $mod+v           exec $scripts/clipboard.sh
bindsym $mod+ctrl+n           exec $scripts/notifications.sh
bindsym $mod+ctrl+comma       exec $scripts/settings.sh
#bindsym $mod+p           exec $scripts/notepad.sh
bindsym $mod+ctrl+c           exec $scripts/control-center.sh
bindsym $mod+y           exec $scripts/wallpaper.sh
bindsym $mod+ctrl+x           exec $scripts/powermenu.sh
bindsym $mod+shift+w     exec $scripts/welcome.sh

# ════════════════════════════════════════════════════════════════════
#  CORE APPLICATIONS
# ════════════════════════════════════════════════════════════════════
#bindsym $mod+Return      exec $term
bindsym $mod+d           exec rofi -show drun
bindsym $mod+b           exec $browser
#bindsym $mod+f           exec $file_manager
bindsym $mod+shift+f     exec $file_manager2
bindsym $mod+e           exec $editor
#bindsym $mod+o           exec obs
# Keybinds cheat sheet
bindsym $mod+h           exec $scripts/keyhints.sh
bindsym $mod+Shift+d     exec $menu
# ════════════════════════════════════════════════════════════════════
#  J.A.R.V.I.S. MENU
# ════════════════════════════════════════════════════════════════════
bindsym $mod+j           exec $jarvis_menu
bindsym $mod+shift+j     exec $term -e $jarvis

# ════════════════════════════════════════════════════════════════════
#  WEBAPPS  (Mod + Ctrl + key)
# ════════════════════════════════════════════════════════════════════
bindsym $mod+ctrl+y      exec $scripts/webapps.sh youtube
bindsym $mod+ctrl+t      exec $scripts/webapps.sh twitch
bindsym $mod+ctrl+d      exec $scripts/webapps.sh discord
bindsym $mod+ctrl+s      exec $scripts/webapps.sh spotify

# ════════════════════════════════════════════════════════════════════
#  WINDOW MANAGEMENT
# ════════════════════════════════════════════════════════════════════
# Close / Kill
bindsym $mod+q           kill
bindsym $mod+shift+q     exec $sound_system closing-window && swaymsg kill

# Fullscreen / Maximize
#bindsym $mod+shift+f     fullscreen toggle
bindsym $mod+F11         fullscreen toggle

# Floating toggle
bindsym $mod+ctrl+v      floating toggle
bindsym $mod+shift+v     focus mode_toggle

# Layout modes
bindsym $mod+w           layout tabbed
#bindsym $mod+s           layout stacking
bindsym $mod+t           layout toggle split

# Resize columns/rows
bindsym $mod+r           exec swaymsg resize set width 50ppt

# Center floating window
bindsym $mod+alt+c       move position center

# Resize mode (hold $mod+r then arrow keys)
mode "resize" {
    bindsym Left   resize shrink width  20px
    bindsym Right  resize grow   width  20px
    bindsym Up     resize shrink height 20px
    bindsym Down   resize grow   height 20px
    bindsym h      resize shrink width  20px
    bindsym semicolon resize grow width 20px
    bindsym k      resize shrink height 20px
    bindsym j      resize grow   height 20px
    # Percentage shortcuts
    bindsym $mod+minus    resize shrink width 10 ppt
    bindsym $mod+equal    resize grow   width 10 ppt
    # Exit resize mode
    bindsym Return mode "default"
    bindsym Escape mode "default"
    bindsym $mod+r mode "default"
}
bindsym $mod+ctrl+r mode "resize"

# Quick width adjust (no resize mode needed)
bindsym $mod+minus       resize shrink width 10 ppt
bindsym $mod+equal       resize grow   width 10 ppt
bindsym $mod+shift+minus resize shrink height 10 ppt
bindsym $mod+shift+equal resize grow   height 10 ppt

# ════════════════════════════════════════════════════════════════════
#  FOCUS MOVEMENT
# ════════════════════════════════════════════════════════════════════
bindsym $mod+Left        focus left
bindsym $mod+Right       focus right
bindsym $mod+Up          focus up
bindsym $mod+Down        focus down
# Vim-style (with Alt to avoid conflicts)
#bindsym $mod+alt+h       focus left
#bindsym $mod+j           focus down
#bindsym $mod+k           focus up
#bindsym $mod+semicolon   focus right

# ════════════════════════════════════════════════════════════════════
#  WINDOW MOVEMENT
# ════════════════════════════════════════════════════════════════════
bindsym $mod+ctrl+h      move left
bindsym $mod+ctrl+semicolon move right
bindsym $mod+ctrl+k      move up
bindsym $mod+ctrl+j      move down
# Vim-style


# ════════════════════════════════════════════════════════════════════
#  SCRATCHPAD
# ════════════════════════════════════════════════════════════════════
#bindsym $mod+shift+minus move scratchpad
bindsym $mod+grave       scratchpad show

# ════════════════════════════════════════════════════════════════════
#  SCREENSHOTS  (+J.A.R.V.I.S. sound feedback)
# ════════════════════════════════════════════════════════════════════
# Full screenshot → clipboard + file
bindsym F10        exec grim ~/Pictures/Screenshots/$(date +%Y%m%d-%H%M%S).png && sound-system screenshot
# Region select
bindsym Ctrl+F10   exec grim -g "$(slurp)" ~/Pictures/Screenshots/$(date +%Y-%m-%d_%H-%M-%S).png && sound-system screenshot
# Active window
bindsym Shift+F10  exec ~/.config/sway/scripts/screenshot_display.sh && $sound_system screenshot
# Photo export with J.A.R.V.I.S.
bindsym $mod+shift+e exec $scripts/photo-export.sh

# ════════════════════════════════════════════════════════════════════
#  AUDIO CONTROLS  (+adaptive J.A.R.V.I.S./iDroid feedback)
# ════════════════════════════════════════════════════════════════════
bindsym XF86AudioRaiseVolume exec $sound_system volume-up   && pactl set-sink-volume @DEFAULT_SINK@ +5%
bindsym XF86AudioLowerVolume exec $sound_system volume-down && pactl set-sink-volume @DEFAULT_SINK@ -5%
bindsym XF86AudioMute        exec $scripts/toggle-mute.sh
bindsym XF86AudioMicMute     exec pactl set-source-mute @DEFAULT_SOURCE@ toggle

# ════════════════════════════════════════════════════════════════════
#  MEDIA CONTROLS
# ════════════════════════════════════════════════════════════════════
bindsym XF86AudioPlay  exec playerctl play-pause && $sound_system music-play
bindsym XF86AudioNext  exec playerctl next       && $sound_system music-next
bindsym XF86AudioPrev  exec playerctl previous   && $sound_system music-previous
bindsym XF86AudioStop  exec playerctl stop

# ════════════════════════════════════════════════════════════════════
#  BRIGHTNESS
# ════════════════════════════════════════════════════════════════════
bindsym XF86MonBrightnessUp   exec brightnessctl set +10%
bindsym XF86MonBrightnessDown exec brightnessctl set  10%-

# ════════════════════════════════════════════════════════════════════
#  GAMING MODE  (Mod + G — iDroid voice)
# ════════════════════════════════════════════════════════════════════
bindsym $mod+g           exec $scripts/toggle-gamemode.sh

# Steam launchers
bindsym $mod+alt+s       exec $sound_system steam-launch && steam
bindsym $mod+alt+g       exec $scripts/launch-gamescope.sh
bindsym $mod+alt+l       exec lutris
bindsym $mod+alt+p       exec protonup-qt

# ════════════════════════════════════════════════════════════════════
#  PHOTOGRAPHY WORKFLOW  (Mod + Shift + P group)
# ════════════════════════════════════════════════════════════════════
#bindsym $mod+mod1+d     exec darktable   && $sound_system photo-mode
bindsym $mod+ctrl+g     exec gimp
bindsym $mod+shift+k     exec digikam
bindsym $mod+shift+i     exec krita

# ════════════════════════════════════════════════════════════════════
#  SYSTEM
# ════════════════════════════════════════════════════════════════════
bindsym $mod+ctrl+l      exec $sound_system locking-screen && swaylock
#bindsym $mod+alt+l       exec $sound_system locking-screen && swaylock
bindsym $mod+ctrl+p      exec $scripts/powermenu.sh
bindsym $mod+alt+e       exec swaymsg exit
bindsym $mod+shift+p     exec swaymsg output \* dpms off
bindsym $mod+shift+slash exec swaymsg -t get_bindings | less
# Reload SwayFX config
bindsym $mod+shift+c     exec $sound_system reloading-config && swaymsg reload
